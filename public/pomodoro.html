<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 max-w-md w-full">
        <h1 class="text-3xl md:text-4xl font-bold text-center text-gray-800 mb-8">ポモドーロタイマー</h1>

        <!-- モード切り替え -->
        <div class="flex gap-2 mb-8">
            <button id="workBtn" class="flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-indigo-600 text-white shadow-lg">
                作業
            </button>
            <button id="breakBtn" class="flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300">
                休憩
            </button>
        </div>

        <!-- タイマー表示 -->
        <div class="bg-gradient-to-br from-gray-50 to-gray-100 rounded-2xl p-8 mb-8 shadow-inner">
            <div id="timer" class="text-7xl md:text-8xl font-bold text-center text-gray-800 tabular-nums" aria-live="polite">
                25:00
            </div>
            <div id="modeLabel" class="text-center text-gray-600 mt-4 text-lg font-medium">
                作業モード
            </div>
        </div>

        <!-- コントロールボタン -->
        <div class="flex gap-3">
            <button id="startBtn" class="flex-1 py-4 px-6 rounded-xl font-bold text-lg transition-all bg-green-500 text-white hover:bg-green-600 shadow-lg hover:shadow-xl transform hover:scale-105" aria-label="スタート">
                スタート
            </button>
            <button id="pauseBtn" class="flex-1 py-4 px-6 rounded-xl font-bold text-lg transition-all bg-yellow-500 text-white hover:bg-yellow-600 shadow-lg hover:shadow-xl transform hover:scale-105 hidden" aria-label="一時停止">
                一時停止
            </button>
            <button id="resetBtn" class="py-4 px-6 rounded-xl font-bold text-lg transition-all bg-red-500 text-white hover:bg-red-600 shadow-lg hover:shadow-xl transform hover:scale-105" aria-label="リセット">
                リセット
            </button>
        </div>
    </div>

    <script>
        // タイマー設定
        const TIMER_CONFIG = {
            work: 25 * 60,    // 25分 = 1500秒
            break: 5 * 60     // 5分 = 300秒
        };

        // 状態管理
        let mode = 'work';
        let timeLeft = TIMER_CONFIG.work;
        let isRunning = false;
        let intervalId = null;

        // DOM要素
        const timerDisplay = document.getElementById('timer');
        const modeLabel = document.getElementById('modeLabel');
        const workBtn = document.getElementById('workBtn');
        const breakBtn = document.getElementById('breakBtn');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 時間フォーマット (秒 → MM:SS)
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // タイマー表示更新
        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
            modeLabel.textContent = mode === 'work' ? '作業モード' : '休憩モード';

            // モードボタンのスタイル更新
            if (mode === 'work') {
                workBtn.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-indigo-600 text-white shadow-lg';
                breakBtn.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300';
            } else {
                workBtn.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300';
                breakBtn.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all bg-green-500 text-white shadow-lg';
            }

            // 実行中のアニメーション
            if (isRunning) {
                timerDisplay.classList.add('pulse-animation');
            } else {
                timerDisplay.classList.remove('pulse-animation');
            }
        }

        // 通知音再生 (Web Audio API)
        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800; // 周波数 (Hz)
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // タイマーティック (1秒ごと)
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                // 時間終了
                playNotificationSound();
                stop();

                // 自動でモード切り替え
                mode = mode === 'work' ? 'break' : 'work';
                timeLeft = TIMER_CONFIG[mode];
                updateDisplay();
            }
        }

        // スタート
        function start() {
            if (!isRunning) {
                isRunning = true;
                intervalId = setInterval(tick, 1000);
                startBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                updateDisplay();
            }
        }

        // 一時停止
        function pause() {
            if (isRunning) {
                isRunning = false;
                clearInterval(intervalId);
                intervalId = null;
                startBtn.classList.remove('hidden');
                pauseBtn.classList.add('hidden');
                updateDisplay();
            }
        }

        // 停止（内部用）
        function stop() {
            isRunning = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            updateDisplay();
        }

        // リセット
        function reset() {
            stop();
            timeLeft = TIMER_CONFIG[mode];
            updateDisplay();
        }

        // モード切り替え
        function switchMode(newMode) {
            if (newMode !== mode) {
                stop();
                mode = newMode;
                timeLeft = TIMER_CONFIG[mode];
                updateDisplay();
            }
        }

        // イベントリスナー
        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);
        workBtn.addEventListener('click', () => switchMode('work'));
        breakBtn.addEventListener('click', () => switchMode('break'));

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    pause();
                } else {
                    start();
                }
            } else if (e.code === 'KeyR') {
                reset();
            }
        });

        // 初期表示
        updateDisplay();
    </script>
</body>
</html>
